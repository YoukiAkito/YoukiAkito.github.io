<header class="site-header">
  <div class="container">
    <a href="{{ "/" | absURL }}" class="site-title">{{ .Site.Title }}</a>
    <div class="site-actions">
      <nav class="site-nav">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="{{ if eq $.RelPermalink .URL }}active{{ end }}">{{ .Name }}</a>
        {{ end }}
      </nav>
      <div class="color-mode-switcher" aria-label="明暗模式切换">
        <button type="button" data-color-mode-switch="light" aria-label="切换到亮色模式" title="亮色模式">☀</button>
        <button type="button" data-color-mode-switch="dark" aria-label="切换到暗色模式" title="暗色模式">☾</button>
      </div>
    </div>
  </div>
</header>
